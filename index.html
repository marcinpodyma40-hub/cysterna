<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cysterna App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#1e293b;font-size:16px;}
.bar{background:#0f1f3d;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;}
.page{padding:14px;max-width:480px;margin:0 auto;}
.hero{background:#0f1f3d;color:#fff;border-radius:10px;padding:16px;margin-bottom:14px;}
.hero h2{font-size:22px;font-weight:900;}
.hero p{font-size:12px;color:#94a3b8;margin-top:4px;}
label{display:block;font-size:12px;font-weight:bold;color:#555;text-transform:uppercase;margin-top:14px;margin-bottom:4px;}
select,input{width:100%;padding:10px;font-size:16px;border:1px solid #ccc;border-radius:8px;background:#fff;}
.produkt-box{background:#fff;border:2px solid #1a56db;border-radius:10px;padding:14px;margin-top:14px;}
.produkt-box h3{color:#0f1f3d;font-size:15px;font-weight:900;margin-bottom:8px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{width:100%;background:#1a56db;color:#fff;border:none;border-radius:10px;padding:15px;font-size:18px;font-weight:bold;margin-top:20px;cursor:pointer;}
.btn-add{width:100%;background:#0f9d58;color:#fff;border:none;border-radius:10px;padding:12px;font-size:16px;font-weight:bold;margin-top:10px;cursor:pointer;}
.btn-remove{background:#ef4444;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;float:right;}
.ok{text-align:center;padding:48px 20px;}
.ok-ico{font-size:64px;margin-bottom:16px;}
.sheets-box{background:#fff;border:2px solid #0f9d58;border-radius:10px;padding:16px;text-align:center;margin-bottom:14px;}
.prog-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px;}
.prog{padding:10px 0;font-size:16px;font-weight:bold;border:2px solid #ddd;border-radius:8px;background:#f8fafc;color:#0f1f3d;cursor:pointer;text-align:center;}
.prog.on{background:#1a56db;border-color:#1a56db;color:#fff;}
</style>
</head>
<body>

<div class="bar">
  <b style="font-size:18px;letter-spacing:1px;">🚛 CYSTERNA<span style="color:#f59e0b;">.</span>APP</b>
  <div>
    <button onclick="showTab('form')" id="btn-form" style="background:#1a56db;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-weight:bold;font-size:13px;cursor:pointer;margin-right:4px;">Formularz</button>
    <button onclick="showTab('admin')" id="btn-admin" style="background:transparent;color:#94a3b8;border:none;border-radius:6px;padding:6px 12px;font-weight:bold;font-size:13px;cursor:pointer;">Biuro</button>
  </div>
</div>

<div id="tab-form" class="page">
  <div id="form-main">
    <div class="hero"><h2>NOWY WPIS</h2><p>Wypełnij dane po zakończeniu trasy</p></div>

    <label>Kierowca *</label>
    <select id="kierowca">
      <option value="">– wybierz –</option>
      <option>Wojtek</option>
      <option>Jakub</option>
      <option>Szczepan</option>
    </select>

    <label>Pojazd *</label>
    <select id="pojazd">
      <option value="">– wybierz –</option>
      <option>1 – PO6S361 / PKN472XC – DAF</option>
      <option>2 – PKN99959 / PKN294XH</option>
      <option>3 – PKN78456</option>
      <option>4 – PKN67518 / PKN142XA</option>
      <option>5 – PKN43062 – DAF</option>
    </select>

    <label>Data trasy *</label>
    <input type="date" id="data">

    <label>Nr zamówienia *</label>
    <input type="text" id="zam" placeholder="np. ZAM/2025/001">

    <label>Nr dokumentu WZ *</label>
    <input type="text" id="wz" placeholder="np. WZ/2025/0123">

    <div class="row2" style="margin-top:14px;">
      <div>
        <label style="margin-top:0">Km start *</label>
        <input type="number" id="kms" placeholder="0" inputmode="numeric">
      </div>
      <div>
        <label style="margin-top:0">Km koniec *</label>
        <input type="number" id="kmk" placeholder="0" inputmode="numeric">
      </div>
    </div>

    <div id="produkty"></div>

    <button class="btn-add" onclick="dodajProdukt()" id="btn-dodaj">+ Dodaj produkt</button>
    <button class="btn" onclick="wyslij()">✓ WYŚLIJ DANE</button>
    <div style="height:24px"></div>
  </div>

  <div id="ok-screen" style="display:none;" class="ok">
    <div class="ok-ico">✅</div>
    <h2 style="color:#0f1f3d;margin-bottom:8px;">Wysłano!</h2>
    <p style="color:#666;margin-bottom:24px;" id="ok-msg">Dane wysłane do Google Sheets!</p>
    <button class="btn" style="width:auto;padding:12px 32px;" onclick="resetForm()">+ Nowy wpis</button>
  </div>
</div>

<div id="tab-admin" class="page" style="display:none;">
  <div class="hero"><h2>PANEL BIURA</h2><p>Dane kierowców w Google Sheets</p></div>
  <div class="sheets-box">
    <p>Wszystkie wpisy kierowców są tutaj:</p>
    <a href="https://docs.google.com/spreadsheets/d/1PSgKxHIP-hN9-urvQ9CIBcGyMB_kMA-kFvWlg3TVX-8/edit" target="_blank" style="display:inline-block;background:#0f9d58;color:#fff;border-radius:8px;padding:12px 24px;font-weight:bold;font-size:16px;text-decoration:none;">📊 Otwórz Google Sheets</a>
  </div>
</div>

<script>
// Programy i ich współczynniki (litry ubytku na 100L)
var PROGRAMY = {
  ON:  [{nr:11,typ:'RZ',wsp:2},{nr:12,typ:'RZ',wsp:3},{nr:13,typ:'RZ',wsp:4},{nr:14,typ:'15',wsp:2},{nr:15,typ:'15',wsp:3},{nr:16,typ:'15',wsp:4}],
  PB:  [{nr:17,typ:'RZ',wsp:2},{nr:18,typ:'15',wsp:2}],
  OP:  [{nr:21,typ:'RZ',wsp:2},{nr:22,typ:'15',wsp:2}]
};

var produktCount = 0;
var selectedProgs = {};

document.getElementById('data').valueAsDate = new Date();
dodajProdukt();

function getPaliwoKey(val) {
  if(val.indexOf('ON')>-1) return 'ON';
  if(val.indexOf('PB')>-1) return 'PB';
  if(val.indexOf('Olej opałowy')>-1) return 'OP';
  return null;
}

function dodajProdukt() {
  if(produktCount >= 3) { alert('Maksymalnie 3 produkty!'); return; }
  produktCount++;
  var id = produktCount;
  selectedProgs[id] = null;

  var div = document.createElement('div');
  div.className = 'produkt-box';
  div.id = 'produkt-' + id;
  div.innerHTML =
    '<h3>PRODUKT ' + id + (id>1?'<button class="btn-remove" onclick="usunProdukt('+id+')">✕ Usuń</button>':'') + '</h3>' +
    '<label>Rodzaj paliwa *</label>' +
    '<select id="pal-'+id+'" onchange="renderProgramy('+id+')">' +
      '<option value="">– wybierz –</option>' +
      '<option value="ON">ON – Olej napędowy</option>' +
      '<option value="PB">PB95 – Benzyna</option>' +
      '<option value="OP">Olej opałowy</option>' +
    '</select>' +
    '<label>Program rozlewania *</label>' +
    '<div class="prog-grid" id="progi-'+id+'"><p style="color:#999;font-size:13px;">Najpierw wybierz paliwo</p></div>' +
    '<div style="background:#f0f4f8;border-radius:8px;padding:10px;margin-top:14px;">' +
      '<p style="font-size:12px;font-weight:bold;color:#0f1f3d;text-transform:uppercase;margin-bottom:8px;">📋 Załadunek (z WZ)</p>' +
      '<div class="row2">' +
        '<div><label style="margin-top:0">Litry RZ *</label><input type="number" id="zal-rz-'+id+'" placeholder="0" inputmode="numeric"></div>' +
        '<div><label style="margin-top:0">Litry 15°C *</label><input type="number" id="zal-15-'+id+'" placeholder="0" inputmode="numeric"></div>' +
      '</div>' +
    '</div>' +
    '<div style="background:#fff3e0;border-radius:8px;padding:10px;margin-top:10px;">' +
      '<p style="font-size:12px;font-weight:bold;color:#0f1f3d;text-transform:uppercase;margin-bottom:8px;">🔧 Rozlane u klientów (z licznika)</p>' +
      '<div class="row2">' +
        '<div><label style="margin-top:0">Litry RZ *</label><input type="number" id="roz-rz-'+id+'" placeholder="0" inputmode="numeric"></div>' +
        '<div><label style="margin-top:0">Litry 15°C *</label><input type="number" id="roz-15-'+id+'" placeholder="0" inputmode="numeric"></div>' +
      '</div>' +
    '</div>';

  document.getElementById('produkty').appendChild(div);
  if(produktCount >= 3) document.getElementById('btn-dodaj').style.display='none';
}

function usunProdukt(id) {
  var el = document.getElementById('produkt-'+id);
  if(el) el.remove();
  delete selectedProgs[id];
  if(produktCount >= 3) document.getElementById('btn-dodaj').style.display='block';
  produktCount--;
}

function renderProgramy(id) {
  var pal = document.getElementById('pal-'+id).value;
  var cont = document.getElementById('progi-'+id);
  selectedProgs[id] = null;
  if(!pal) { cont.innerHTML='<p style="color:#999;font-size:13px;">Najpierw wybierz paliwo</p>'; return; }
  var progi = PROGRAMY[pal];
  cont.innerHTML = '';
  progi.forEach(function(p) {
    var btn = document.createElement('div');
    btn.className = 'prog';
    btn.id = 'prog-'+id+'-'+p.nr;
    btn.innerHTML = p.nr+'<br><span style="font-size:10px;font-weight:normal;">'+p.typ+'</span>';
    btn.onclick = function() { selProg(id, p.nr); };
    cont.appendChild(btn);
  });
}

function selProg(id, nr) {
  selectedProgs[id] = nr;
  var pal = document.getElementById('pal-'+id).value;
  var progi = PROGRAMY[pal];
  progi.forEach(function(p) {
    var el = document.getElementById('prog-'+id+'-'+p.nr);
    if(el) el.className = 'prog' + (p.nr===nr?' on':'');
  });
}

function getProgData(palKey, nr) {
  if(!palKey || !nr) return null;
  var progi = PROGRAMY[palKey];
  for(var i=0;i<progi.length;i++) { if(progi[i].nr===nr) return progi[i]; }
  return null;
}

function wyslij() {
  var kierowca=document.getElementById('kierowca').value;
  var pojazd=document.getElementById('pojazd').value;
  var data=document.getElementById('data').value;
  var zam=document.getElementById('zam').value.trim();
  var wz=document.getElementById('wz').value.trim();
  var kms=parseFloat(document.getElementById('kms').value);
  var kmk=parseFloat(document.getElementById('kmk').value);

  if(!kierowca||!pojazd||!data||!zam||!wz||isNaN(kms)||isNaN(kmk)){
    alert('Uzupełnij wszystkie pola ogólne!'); return;
  }
  if(kmk<kms){alert('Km koniec musi być większy!');return;}

  var ids = Object.keys(selectedProgs);
  if(ids.length===0){alert('Dodaj przynajmniej jeden produkt!');return;}

  var produktyData = [];
  for(var i=0;i<ids.length;i++){
    var id = ids[i];
    var el = document.getElementById('produkt-'+id);
    if(!el) continue;
    var pal = document.getElementById('pal-'+id).value;
    var prog = selectedProgs[id];
    var zalRZ = parseFloat(document.getElementById('zal-rz-'+id).value);
    var zal15 = parseFloat(document.getElementById('zal-15-'+id).value);
    var rozRZ = parseFloat(document.getElementById('roz-rz-'+id).value);
    var roz15 = parseFloat(document.getElementById('roz-15-'+id).value);

    if(!pal||!prog||isNaN(zalRZ)||isNaN(zal15)||isNaN(rozRZ)||isNaN(roz15)){
      alert('Uzupełnij wszystkie pola dla Produktu '+id+'!'); return;
    }

    var progData = getProgData(pal, prog);
    var wsp = progData ? progData.wsp/100 : 0;
    var typ = progData ? progData.typ : '';

    // Obliczenia na podstawie typu programu
    var zalUzyty = typ==='15' ? zal15 : zalRZ;
    var rozUzyty = typ==='15' ? roz15 : rozRZ;
    var normaUbytek = +(zalUzyty * wsp).toFixed(2);
    var roznica = +(zalUzyty - rozUzyty).toFixed(2);
    var roznicaNetto = +(roznica - normaUbytek).toFixed(2);
    var status = roznicaNetto < 0 ? 'OSZCZĘDNOŚĆ' : roznicaNetto <= 10 ? 'OK – W NORMIE' : roznicaNetto <= 50 ? 'PONAD NORMĘ' : 'DUŻY UBYTEK';

    produktyData.push({
      nrProduktu: i+1,
      paliwo: pal,
      program: prog,
      typProg: typ,
      zaladunek_RZ: zalRZ,
      zaladunek_15: zal15,
      rozlane_RZ: rozRZ,
      rozlane_15: roz15,
      normaUbytek: normaUbytek,
      roznica: roznica,
      roznicaNetto: roznicaNetto,
      status: status
    });
  }

  var payload = {
    kierowca:kierowca, pojazd:pojazd, data:data, zam:zam, wz:wz,
    kmStart:kms, kmKoniec:kmk, km:kmk-kms,
    produkty: produktyData,
    ts: new Date().toLocaleString('pl-PL')
  };

  fetch('https://script.google.com/macros/s/AKfycby66lPVes7wEC6K2FWG-d1udV8A4VEkF2eyNEzNvE53zIaZ4T2k167LhkqQ1A7T4aFblQ/exec',{
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).catch(function(){});

  document.getElementById('form-main').style.display='none';
  document.getElementById('ok-screen').style.display='block';
}

function resetForm() {
  document.getElementById('kierowca').value='';
  document.getElementById('pojazd').value='';
  document.getElementById('data').valueAsDate=new Date();
  document.getElementById('zam').value='';
  document.getElementById('wz').value='';
  document.getElementById('kms').value='';
  document.getElementById('kmk').value='';
  document.getElementById('produkty').innerHTML='';
  produktCount=0;
  selectedProgs={};
  document.getElementById('btn-dodaj').style.display='block';
  document.getElementById('form-main').style.display='block';
  document.getElementById('ok-screen').style.display='none';
  dodajProdukt();
}

function showTab(t) {
  document.getElementById('tab-form').style.display = t==='form'?'block':'none';
  document.getElementById('tab-admin').style.display = t==='admin'?'block':'none';
  document.getElementById('btn-form').style.background = t==='form'?'#1a56db':'transparent';
  document.getElementById('btn-form').style.color = t==='form'?'#fff':'#94a3b8';
  document.getElementById('btn-admin').style.background = t==='admin'?'#1a56db':'transparent';
  document.getElementById('btn-admin').style.color = t==='admin'?'#fff':'#94a3b8';
}
</script>
</body>
</html>
